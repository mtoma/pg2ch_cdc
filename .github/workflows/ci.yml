name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL
        run: |
          docker run -d --name postgres --network host \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=test_db \
            postgres:16 \
            postgres -c wal_level=logical
          # Wait for PG to be ready
          for i in $(seq 1 30); do
            docker exec postgres pg_isready -U test && break
            sleep 1
          done

      - name: Start ClickHouse
        run: |
          docker run -d --name clickhouse --network host \
            -e CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1 \
            -e CLICKHOUSE_PASSWORD="" \
            clickhouse/clickhouse-server:latest
          # Wait for CH to be ready
          for i in $(seq 1 30); do
            curl -sf 'http://localhost:8123/?query=SELECT+1' && break
            sleep 1
          done

      - name: Verify services
        env:
          PGPASSWORD: test
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U test -d test_db -c "SHOW wal_level;" | grep logical
          psql -h localhost -U test -d test_db -c "ALTER USER test WITH REPLICATION;"
          # CH may need a moment after initial startup
          for i in $(seq 1 15); do
            curl -sf 'http://localhost:8123/?query=SELECT+version()' && break
            echo "Waiting for ClickHouse... attempt $i"
            sleep 2
          done

      - name: Install system dependencies
        run: sudo apt-get install -y libpq-dev clang

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Test basic replication
        env:
          TEST_PG_HOST: localhost
          TEST_PG_PORT: "5432"
          TEST_PG_USER: test
          TEST_PG_PASSWORD: test
          TEST_PG_DATABASE: test_db
          TEST_CH_HOST: localhost
          TEST_CH_PORT: "8123"
          TEST_CH_USER: default
          TEST_CH_PASSWORD: ""
        run: bash tests/test_basic_replication.sh

      - name: Test DELETE with non-contiguous PK
        env:
          TEST_PG_HOST: localhost
          TEST_PG_PORT: "5432"
          TEST_PG_USER: test
          TEST_PG_PASSWORD: test
          TEST_PG_DATABASE: test_db
          TEST_CH_HOST: localhost
          TEST_CH_PORT: "8123"
          TEST_CH_USER: default
          TEST_CH_PASSWORD: ""
        run: bash tests/test_delete_noncontiguous_pk.sh

      - name: Test concurrent DML during initial load
        env:
          TEST_PG_HOST: localhost
          TEST_PG_PORT: "5432"
          TEST_PG_USER: test
          TEST_PG_PASSWORD: test
          TEST_PG_DATABASE: test_db
          TEST_CH_HOST: localhost
          TEST_CH_PORT: "8123"
          TEST_CH_USER: default
          TEST_CH_PASSWORD: ""
        run: bash tests/test_concurrent_dml_during_load.sh

      - name: Test PK-changing UPDATEs
        env:
          TEST_PG_HOST: localhost
          TEST_PG_PORT: "5432"
          TEST_PG_USER: test
          TEST_PG_PASSWORD: test
          TEST_PG_DATABASE: test_db
          TEST_CH_HOST: localhost
          TEST_CH_PORT: "8123"
          TEST_CH_USER: default
          TEST_CH_PASSWORD: ""
        run: bash tests/test_pk_update.sh
